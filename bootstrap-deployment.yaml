apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootstrap-deployment
  labels:
      app: boostrap-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bootstrap-deployment
  template:
    metadata:
      labels:
        app: bootstrap-deployment
    spec:
      containers:
      - name: eon-client
        image: sajmon/eon-client
        command: [
          "eon-client",
          "--stdout",
          "--log-level", "debug",
          "--bootstrap-mode",
          "--secret-key-seed", "1"
        ]
        ports:
        - containerPort: 22137
